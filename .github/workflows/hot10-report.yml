name: "🔥 buzzAnalysis (hot10) Report"

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      HOT10_TELEGRAM_CHAT_ID: ${{ secrets.HOT10_TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Ensure data directory
        run: mkdir -p data

      - name: Run hot10 report
        run: node hot10/index.js report

      - name: Commit hot10 DB to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/hot10.db
          if git diff --cached --quiet; then
            echo "[hot10] DB 변경 없음 — 커밋 스킵"
            exit 0
          fi
          git commit -m "chore: hot10 report $(TZ=Asia/Seoul date '+%Y-%m-%d')"
          attempt=1
          until git pull --rebase origin main && git push; do
            if [ "$attempt" -ge 3 ]; then
              echo "[hot10] 푸시 재시도 3회 실패"
              exit 1
            fi
            attempt=$((attempt+1))
            sleep $((attempt*5))
          done

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${HOT10_TELEGRAM_CHAT_ID:-$TELEGRAM_CHAT_ID}" \
            -d text="⚠️ buzzAnalysis(hot10) 리포트 실패%0A%0A시간: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')%0A로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0A확인 필요합니다."
