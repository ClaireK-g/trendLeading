name: "🔍 F&B Trend Pipeline"

on:
  schedule:
    # 매일 오전 5시 KST (UTC 20:00 전날)
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NAVER_SEARCH_CLIENT_ID: ${{ secrets.NAVER_SEARCH_CLIENT_ID }}
      NAVER_SEARCH_CLIENT_SECRET: ${{ secrets.NAVER_SEARCH_CLIENT_SECRET }}
      NAVER_DATALAB_CLIENT_ID: ${{ secrets.NAVER_DATALAB_CLIENT_ID }}
      NAVER_DATALAB_CLIENT_SECRET: ${{ secrets.NAVER_DATALAB_CLIENT_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Restore previous DB
        uses: actions/download-artifact@v4
        with:
          name: trend-db
          path: data/
        continue-on-error: true

      - name: Ensure data directory
        run: mkdir -p data

      - name: Run pipeline
        id: pipeline
        run: node index.js run

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-db
          path: data/trend.db
          retention-days: 90
          overwrite: true

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ trendLeading 파이프라인 실패%0A%0A시간: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')%0A로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0A확인 필요합니다."
